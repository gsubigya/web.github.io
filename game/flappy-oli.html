<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d1a">
<title>Flappy Oli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f5c842;--gold2:#e8a020;--red:#e03030;--sky1:#0d0d2b;--sky2:#1a1a3e;
  --sky3:#2a1a4a;--pipe:#2d6e3a;--pipe2:#3d8e4a;--hud:rgba(8,6,24,0.82);
}
html,body{
  width:100%;height:100%;overflow:hidden;background:#06061a;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;
  touch-action:none;user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;
  overscroll-behavior:none;
}
#wrap{
  position:relative;width:100%;height:100%;
  max-width:480px;max-height:900px;overflow:hidden;
  background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 55%,var(--sky3) 100%);
  box-shadow:0 0 60px rgba(5,4,20,0.98);overscroll-behavior:contain;
}
#stars{position:absolute;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.08}100%{opacity:.6}}
canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1;display:block;touch-action:none}
/* HUD */
#hud{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px 8px 0;gap:5px;pointer-events:none
}
.hb{
  background:var(--hud);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:6px 10px;backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);min-width:58px;text-align:center
}
.hl{font-family:'Press Start 2P',monospace;font-size:5px;color:rgba(255,255,255,0.45);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.hv{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;
  color:var(--gold);text-shadow:0 0 8px rgba(245,200,66,0.5);line-height:1}
#hb-lvl{background:rgba(80,55,10,0.6);border-color:rgba(245,200,66,0.35)}
#hb-coin{background:rgba(200,130,20,0.12);border-color:rgba(245,200,66,0.3)}
#hv-coin{color:#f5a820;text-shadow:0 0 8px rgba(245,168,32,0.5)}
/* score center */
#sc{position:absolute;top:76px;left:50%;transform:translateX(-50%);
  z-index:11;text-align:center;pointer-events:none;white-space:nowrap}
#sd{font-family:'Press Start 2P',monospace;font-size:clamp(26px,7vw,38px);
  color:#fff;text-shadow:0 0 14px rgba(245,200,66,0.5),2px 2px 0 rgba(0,0,0,.5);line-height:1}
#lp{position:absolute;top:130px;left:50%;transform:translateX(-50%);
  z-index:11;width:min(110px,32vw);pointer-events:none}
#lpb{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
#lpf{height:100%;background:linear-gradient(90deg,#5a3810,var(--gold));
  border-radius:3px;width:0%;transition:width .3s ease}
/* CTRL BTNS */
#ctrl{position:absolute;top:8px;right:8px;z-index:15;
  display:none;gap:5px;flex-direction:column;align-items:flex-end}
#ctrl.on{display:flex}
.cb{
  background:rgba(8,6,24,0.88);border:1px solid rgba(255,255,255,0.15);
  border-radius:8px;color:#fff;font-family:'Press Start 2P',monospace;
  font-size:8px;padding:7px 10px;cursor:pointer;letter-spacing:1px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  transition:background .15s,transform .1s;white-space:nowrap
}
.cb:active{transform:scale(.91)}
#pb{font-size:13px;padding:7px 12px}
/* SPEED PANEL */
#sp{
  position:absolute;bottom:68px;left:50%;transform:translateX(-50%);
  z-index:15;display:none;gap:5px;align-items:center;
  background:rgba(8,6,24,0.92);border:1px solid rgba(255,255,255,0.1);
  border-radius:30px;padding:8px 14px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)
}
#sp.on{display:flex}
.sl{font-family:'Press Start 2P',monospace;font-size:5px;color:rgba(255,255,255,.4);
  letter-spacing:1px;margin-right:4px}
.sb{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;color:rgba(255,255,255,.5);font-family:'Orbitron',monospace;
  font-size:10px;font-weight:700;padding:5px 10px;cursor:pointer;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:all .15s
}
.sb.on{background:rgba(245,200,66,0.25);border-color:rgba(245,200,66,0.7);color:var(--gold)}
.sb:active{transform:scale(.88)}
/* TOAST */
#toast{
  position:absolute;top:56px;left:50%;
  transform:translateX(-50%) translateY(-90px);
  z-index:30;background:rgba(18,10,4,.92);
  border:1px solid rgba(245,200,66,.4);border-radius:30px;
  padding:7px 18px 7px 12px;display:flex;align-items:center;gap:10px;
  pointer-events:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  opacity:0;white-space:nowrap;
  box-shadow:0 4px 24px rgba(0,0,0,.55),0 0 16px rgba(245,200,66,.1);
  transition:transform .35s cubic-bezier(.175,.885,.32,1.275),opacity .35s ease
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast-lv{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;
  color:var(--gold);text-shadow:0 0 10px rgba(245,200,66,.45);line-height:1}
.tbody{display:flex;flex-direction:column;gap:2px}
.ttl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gold);
  letter-spacing:1px;text-transform:uppercase}
.tsub{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;
  color:rgba(255,255,255,.5);letter-spacing:.5px}
/* GROUND */
#ground{
  position:absolute;bottom:0;left:0;right:0;height:56px;z-index:5;
  pointer-events:none;
  background:linear-gradient(180deg,#2e5228 0%,#1e3a18 40%,#101c0a 100%);
  border-top:2px solid #3a6234;overflow:hidden
}
/* PARTICLES */
.pt{position:absolute;border-radius:50%;pointer-events:none;z-index:15;
  animation:ptfly var(--dur,.6s) ease-out forwards}
@keyframes ptfly{from{opacity:1;transform:translate(0,0) scale(1)} to{opacity:0;transform:translate(var(--dx,0px),var(--dy,0px)) scale(.2)}}
/* COUNTDOWN */
#cd{position:absolute;inset:0;z-index:18;display:none;
  align-items:center;justify-content:center;pointer-events:none}
#cd.on{display:flex}
#cdn{
  font-family:'Press Start 2P',monospace;font-size:clamp(60px,18vw,90px);
  color:var(--gold);text-shadow:0 0 24px rgba(245,200,66,.45),3px 3px 0 rgba(0,0,0,.5);
  animation:cpop .8s ease-out
}
@keyframes cpop{0%{transform:scale(2);opacity:0}30%{transform:scale(.85);opacity:1}100%{transform:scale(1);opacity:1}}
/* PAUSE OVERLAY */
#pov{
  position:absolute;inset:0;z-index:25;display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
  background:rgba(0,0,0,.78);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)
}
#pov.on{display:flex}
.ptit{font-family:'Press Start 2P',monospace;font-size:clamp(18px,5vw,26px);
  color:var(--gold);text-shadow:2px 2px 0 #8a5010;letter-spacing:2px}
.psub{font-family:'Press Start 2P',monospace;font-size:7px;
  color:rgba(255,255,255,.4);letter-spacing:2px}
/* START */
#ss{
  position:absolute;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(180deg,rgba(10,8,30,.97) 0%,rgba(20,15,50,.95) 100%);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)
}
#face-logo{
  width:90px;height:90px;border-radius:50%;
  background:var(--gold);display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;overflow:hidden;
  box-shadow:0 0 0 4px var(--gold2),0 0 30px rgba(245,200,66,.5);
  animation:float 2s ease-in-out infinite
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#face-logo img{width:100%;height:100%;object-fit:cover}
.ltit{font-family:'Press Start 2P',monospace;font-size:clamp(18px,5vw,24px);
  color:var(--gold);text-shadow:2px 2px 0 #8a5010,4px 4px 0 rgba(0,0,0,.3);
  letter-spacing:2px;margin-bottom:4px;text-align:center}
.lsub{font-family:'Press Start 2P',monospace;font-size:8px;
  color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;text-align:center}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin:18px 0;width:min(290px,80vw)}
.sc2{background:rgba(255,255,255,.05);border:1px solid rgba(245,200,66,.2);
  border-radius:12px;padding:12px 10px;text-align:center}
.sc2 .sl2{font-family:'Press Start 2P',monospace;font-size:6px;
  color:rgba(255,255,255,.4);margin-bottom:6px;text-transform:uppercase}
.sc2 .sv{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:var(--gold)}
.sc2 .svc{color:#f5a820;text-shadow:0 0 8px rgba(245,168,32,.4)}
#play-btn{
  margin-top:6px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);
  color:#1a0e00;font-family:'Press Start 2P',monospace;
  font-size:clamp(10px,3vw,13px);padding:15px 36px;
  border:none;border-radius:50px;cursor:pointer;
  letter-spacing:2px;text-transform:uppercase;
  box-shadow:0 4px 20px rgba(200,130,20,.35),0 2px 0 rgba(0,0,0,.35);
  transition:transform .1s ease,box-shadow .1s ease;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden
}
#play-btn:active{transform:scale(.93) translateY(3px);box-shadow:0 1px 6px rgba(200,130,20,.15)}
#play-btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(rgba(255,255,255,.2),transparent);
  border-radius:inherit;pointer-events:none}
.th{margin-top:14px;font-family:'Press Start 2P',monospace;font-size:7px;
  color:rgba(255,255,255,.3);letter-spacing:1px;
  animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.8}}
/* GAME OVER */
#go{
  position:absolute;inset:0;z-index:20;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.84);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)
}
#go.on{display:flex}
.gotit{font-family:'Press Start 2P',monospace;font-size:clamp(18px,5.5vw,26px);
  color:var(--red);text-shadow:2px 2px 0 #6e1818,0 0 16px rgba(200,50,50,.5);
  margin-bottom:6px;animation:shake .4s ease-out}
@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}100%{transform:translateX(0)}}
.goscr{font-family:'Orbitron',monospace;font-size:clamp(38px,12vw,56px);font-weight:900;
  color:var(--gold);text-shadow:0 0 18px rgba(245,200,66,.45);
  margin-bottom:4px;animation:popin .3s ease-out .2s both}
@keyframes popin{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.goslb{font-family:'Press Start 2P',monospace;font-size:8px;
  color:rgba(255,255,255,.4);margin-bottom:16px;letter-spacing:2px}
.gosts{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;
  width:min(300px,85vw);margin-bottom:18px}
.gost{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:9px 5px;text-align:center}
.gol{font-family:'Press Start 2P',monospace;font-size:5px;
  color:rgba(255,255,255,.35);margin-bottom:4px;text-transform:uppercase}
.gov{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;color:#fff}
.bb{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0e00;
  font-family:'Press Start 2P',monospace;font-size:7px;
  padding:6px 16px;border-radius:20px;margin-bottom:18px;
  display:none;animation:popin .4s ease-out;
  box-shadow:0 0 16px rgba(245,200,66,.35)}
.bb.on{display:block}
#retry-btn{
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);
  color:#1a0e00;font-family:'Press Start 2P',monospace;
  font-size:clamp(9px,2.5vw,11px);padding:13px 28px;
  border:none;border-radius:50px;cursor:pointer;letter-spacing:2px;
  box-shadow:0 4px 16px rgba(200,130,20,.28);
  transition:transform .1s ease;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent
}
#retry-btn:active{transform:scale(.93) translateY(3px)}
/* orientation */
#ob{display:none;position:fixed;inset:0;z-index:9999;
  background:#06061a;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.obi{font-size:52px;animation:rh 2s ease-in-out infinite}
@keyframes rh{0%,100%{transform:rotate(0)}40%{transform:rotate(-90deg)}60%{transform:rotate(-90deg)}}
.obt{font-family:'Press Start 2P',monospace;font-size:9px;color:rgba(255,255,255,.4);
  text-align:center;letter-spacing:1px;line-height:2}
@media (orientation:landscape) and (max-height:500px){
  #ob{display:flex}#wrap{display:none}
}
</style>
</head>
<body>
<div id="ob"><div class="obi">📱</div><div class="obt">ROTATE YOUR<br>PHONE</div></div>
<div id="wrap">
  <div id="stars"></div>
  <div id="hud">
    <div class="hb"><div class="hl">Best</div><div class="hv" id="hv-best">0</div></div>
    <div class="hb" id="hb-lvl"><div class="hl">Level</div><div class="hv" id="hv-lvl">1</div></div>
    <div class="hb" id="hb-coin"><div class="hl">Coins</div><div class="hv" id="hv-coin">0</div></div>
  </div>
  <div id="ctrl">
    <button class="cb" id="pb" onclick="togglePause()">⏸</button>
  </div>
  <div id="sp">
    <span class="sl">SPEED</span>
    <button class="sb on"  id="sp1" onclick="setSpeed(.7,this)">0.7×</button>
    <button class="sb"     id="sp2" onclick="setSpeed(1,this)">1×</button>
    <button class="sb"     id="sp3" onclick="setSpeed(1.4,this)">1.4×</button>
    <button class="sb"     id="sp4" onclick="setSpeed(2,this)">2×</button>
  </div>
  <div id="sc"><div id="sd">0</div></div>
  <div id="lp"><div id="lpb"><div id="lpf"></div></div></div>
  <div id="toast">
    <div id="toast-lv">2</div>
    <div class="tbody">
      <div class="ttl">Level Up!</div>
      <div class="tsub" id="toast-sub">Dusk · Faster</div>
    </div>
    <div style="font-size:15px;line-height:1">⚡</div>
  </div>
  <canvas id="c"></canvas>
  <div id="ground"></div>
  <div id="cd"><div id="cdn">3</div></div>
  <div id="pov" onclick="resumeGame()">
    <div class="ptit">PAUSED</div>
    <div class="psub">tap to resume</div>
  </div>
  <!-- START -->
  <div id="ss">
    <div id="face-logo"><img id="face-img" src="" alt="face"></div>
    <div class="ltit">FLAPPY Oli</div>
    <div class="lsub">Tap &bull; Dodge &bull; Survive</div>
    <div class="sgrid">
      <div class="sc2"><div class="sl2">High Score</div><div class="sv" id="ss-best">0</div></div>
      <div class="sc2"><div class="sl2">Total Coins</div><div class="sv svc" id="ss-coins">0</div></div>
    </div>
    <button id="play-btn" onclick="startCD()">▶ PLAY</button>
    <div class="th">tap / space to flap</div>
  </div>
  <!-- GAME OVER -->
  <div id="go">
    <div class="gotit">GAME OVER</div>
    <div class="goscr" id="go-score">0</div>
    <div class="goslb">SCORE</div>
    <div class="gosts">
      <div class="gost"><div class="gol">Best</div><div class="gov" id="go-best">0</div></div>
      <div class="gost"><div class="gol">Coins</div><div class="gov" id="go-coins" style="color:#f5a820"></div></div>
      <div class="gost"><div class="gol">Time</div><div class="gov" id="go-time">0s</div></div>
    </div>
    <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(255,255,255,.3);margin-bottom:12px;letter-spacing:1px" id="go-lv">LV 1 · Dawn</div>
    <div class="bb" id="bb">⭐ NEW BEST!</div>
    <button id="retry-btn" onclick="startCD()">↺ RETRY</button>
  </div>
</div>
<script>
// ── NATIVE FEEL ──────────────────────────────────────────────────
function tryFS(){const e=document.documentElement,f=e.requestFullscreen||e.webkitRequestFullscreen||e.mozRequestFullScreen||e.msRequestFullscreen;if(f)f.call(e).catch(()=>{})}
document.addEventListener('touchstart',function t(){tryFS();document.removeEventListener('touchstart',t)},{once:true,passive:true});
let wl=null;async function holdScreen(){if('wakeLock' in navigator){try{wl=await navigator.wakeLock.request('screen')}catch(e){}}}
holdScreen();
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')holdScreen()});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.addEventListener('touchstart',e=>{if(e.touches.length>1)e.preventDefault()},{passive:false});
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('selectstart',e=>e.preventDefault());
let _lt=0;
document.addEventListener('touchend',e=>{const n=Date.now();if(n-_lt<300)e.preventDefault();_lt=n},{passive:false});
const hap={
  flap:()=>{try{navigator.vibrate&&navigator.vibrate(12)}catch(e){}},
  coin:()=>{try{navigator.vibrate&&navigator.vibrate([8,20,8])}catch(e){}},
  die: ()=>{try{navigator.vibrate&&navigator.vibrate([30,40,60])}catch(e){}},
  lv:  ()=>{try{navigator.vibrate&&navigator.vibrate([15,30,15])}catch(e){}}
};

// ── STARS ────────────────────────────────────────────────────────
const stEl=document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*72}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
  stEl.appendChild(s);

faceImg.src = 'data:image/png;base64,' + FACE_B64;
document.getElementById('face-img').src = 'data:image/png;base64,' + FACE_B64;

// ── LEVELS ───────────────────────────────────────────────────────
const LEVELS=[
  {score:0, label:'Dawn',    gap:165,speed:2.5, dist:250,grav:0.37},
  {score:5, label:'Dusk',    gap:152,speed:2.85,dist:235,grav:0.38},
  {score:11,label:'Storm',   gap:140,speed:3.2, dist:220,grav:0.39},
  {score:18,label:'Night',   gap:128,speed:3.6, dist:205,grav:0.40},
  {score:26,label:'Abyss',   gap:116,speed:4.0, dist:190,grav:0.41},
  {score:35,label:'Void',    gap:106,speed:4.4, dist:175,grav:0.42},
  {score:46,label:'Inferno', gap:98, speed:4.85,dist:162,grav:0.43},
  {score:58,label:'Chaos',   gap:91, speed:5.3, dist:150,grav:0.44},
];
const PIPE_W=52, COIN_R=10, CLOUD_SPD=0.3;
function getLvIdx(s){let i=0;for(let j=0;j<LEVELS.length;j++)if(s>=LEVELS[j].score)i=j;return i}

// ── CANVAS & STATE ───────────────────────────────────────────────
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const wrap=document.getElementById('wrap');
let W=0,H=0,GND=0,RAF=null;
let state='idle'; // idle countdown playing paused dead
let score=0,coins=0,t0=0,elapsed=0;
let hi=0,totalCoins=0;
let lvIdx=0,pipeAcc=0,skyFlash=0;
let SM=1; // speed multiplier

let bird={x:0,y:0,vy:0,r:16,ang:0,wAng:0,alive:true,trail:[]};
let pipes=[],coinObjs=[],clouds=[],gndOff=0;
let CUR={...LEVELS[0]};

// ── TOAST ────────────────────────────────────────────────────────
let toastT=null;
function showToast(li){
  const lv=LEVELS[li],d=['Faster pipes','Tighter gaps','More gravity','Closing in'];
  document.getElementById('toast-lv').textContent=li+1;
  document.getElementById('toast-sub').textContent=lv.label+' · '+d[li%d.length];
  const t=document.getElementById('toast');
  t.style.transition='none';
  t.style.transform='translateX(-50%) translateY(-90px)';
  t.style.opacity='0';
  void t.offsetWidth;
  t.style.transition='';
  t.classList.add('show');
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),1900);
}

// ── SPEED ────────────────────────────────────────────────────────
function setSpeed(m,btn){
  SM=m;
  document.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

// ── PAUSE ────────────────────────────────────────────────────────
function togglePause(){
  if(state==='playing'){
    state='paused';cancelAnimationFrame(RAF);RAF=null;
    document.getElementById('pb').textContent='▶';
    document.getElementById('pov').classList.add('on');
  } else if(state==='paused'){resumeGame()}
}
function resumeGame(){
  if(state!=='paused')return;
  state='playing';
  document.getElementById('pb').textContent='⏸';
  document.getElementById('pov').classList.remove('on');
  t0=Date.now()-elapsed*1000;
  RAF=requestAnimationFrame(loop);
}
document.getElementById('pov').addEventListener('touchend',function(e){e.preventDefault();resumeGame()},{passive:false});

// ── RESIZE ───────────────────────────────────────────────────────
function resize(){
  const r=wrap.getBoundingClientRect();
  W=Math.floor(r.width);H=Math.floor(r.height);
  canvas.width=W;canvas.height=H;
  GND=H-56;
  if(clouds.length===0)for(let i=0;i<6;i++)spawnCloudAt(Math.random()*W);
  if(state==='idle')draw();
}
window.addEventListener('resize',resize);resize();

// ── CLOUDS ───────────────────────────────────────────────────────
function spawnCloudAt(x){
  clouds.push({x,y:30+Math.random()*(H*.38),w:55+Math.random()*110,
    h:22+Math.random()*32,spd:CLOUD_SPD*(0.4+Math.random()*.9),a:0.05+Math.random()*.1});
}
function spawnCloud(){spawnCloudAt(W+80)}

// ── INIT ─────────────────────────────────────────────────────────
function initBird(){
  bird.x=W*.22;bird.y=H*.42;bird.vy=0;bird.r=16;
  bird.ang=0;bird.wAng=0;bird.alive=true;bird.trail=[];
}
function initPipes(){pipes=[];coinObjs=[];pipeAcc=0;gndOff=0;spawnPipe()}
function spawnPipe(){
  const gap=CUR.gap,minT=60,maxT=GND-gap-65;
  if(maxT<minT)return;
  const topH=minT+Math.random()*(maxT-minT);
  pipes.push({x:W+10,topH,passed:false});
  coinObjs.push({x:W+10+PIPE_W/2,y:topH+gap/2,r:COIN_R,col:false,pulse:0});
}

// ── FLAP ─────────────────────────────────────────────────────────
function flap(){
  if(state!=='playing')return;
  bird.vy=CUR.grav<0.42?-7.2:-7.6;
  hap.flap();
  spawnFlapParts();
}
function spawnFlapParts(){
  for(let i=0;i<4;i++){
    const a=Math.PI/2+(Math.random()-.5)*1.3,sp=1.5+Math.random()*2.5;
    const el=document.createElement('div');el.className='pt';
    el.style.cssText=`width:5px;height:5px;background:rgba(245,200,66,0.55);`
      +`left:${bird.x-bird.r-2}px;top:${bird.y}px;`
      +`--dx:${Math.cos(a)*sp*16}px;--dy:${Math.sin(a)*sp*16}px;--dur:${.3+Math.random()*.2}s`;
    wrap.appendChild(el);setTimeout(()=>el.remove(),550);
  }
}

// ── LEVEL UP ─────────────────────────────────────────────────────
function checkLv(){
  const ni=getLvIdx(score);
  if(ni>lvIdx){
    lvIdx=ni;CUR={...LEVELS[lvIdx]};
    showToast(lvIdx);
    skyFlash=1.0;hap.lv();updateHUD();
  }
}

// ── UPDATE ───────────────────────────────────────────────────────
function update(){
  if(state!=='playing')return;
  elapsed=((Date.now()-t0)/1000)|0;
  const s=SM;

  bird.vy+=CUR.grav;bird.y+=bird.vy;
  bird.ang=Math.min(Math.max(bird.vy*3.8*(Math.PI/180),-28*(Math.PI/180)),72*(Math.PI/180));
  bird.wAng+=0.18;
  bird.trail.push({x:bird.x,y:bird.y});
  if(bird.trail.length>10)bird.trail.shift();

  if(bird.y-bird.r<=0){bird.y=bird.r;bird.vy=Math.max(0,bird.vy)}
  if(bird.y+bird.r>=GND){die();return}

  gndOff=(gndOff+CUR.speed*s)%36;
  pipeAcc+=CUR.speed*s;
  if(pipeAcc>=CUR.dist){pipeAcc=0;spawnPipe()}

  for(let i=pipes.length-1;i>=0;i--){
    const p=pipes[i];p.x-=CUR.speed*s;
    if(!p.passed&&p.x+PIPE_W<bird.x){p.passed=true;score++;updateScoreDisplay();checkLv()}
    const bx=bird.x,by=bird.y,br=bird.r*.80;
    if(bx+br>p.x&&bx-br<p.x+PIPE_W){
      if(by-br<p.topH||by+br>p.topH+CUR.gap){die();return}
    }
    if(p.x+PIPE_W<-20)pipes.splice(i,1);
  }
  for(let i=coinObjs.length-1;i>=0;i--){
    const c=coinObjs[i];c.x-=CUR.speed*s;c.pulse+=0.12;
    if(!c.col){
      const dx=bird.x-c.x,dy=bird.y-c.y;
      if(Math.sqrt(dx*dx+dy*dy)<bird.r+c.r){
        c.col=true;coins++;spawnCoinBurst(c.x,c.y);hap.coin();updateHUD();
      }
    }
    if(c.x<-20)coinObjs.splice(i,1);
  }
  for(let i=clouds.length-1;i>=0;i--){
    clouds[i].x-=clouds[i].spd*s;
    if(clouds[i].x<-250){clouds.splice(i,1);spawnCloud()}
  }
  if(skyFlash>0)skyFlash=Math.max(0,skyFlash-.05);
  updateHUD();
}

// ── SCORE / HUD ───────────────────────────────────────────────────
function updateScoreDisplay(){
  document.getElementById('sd').textContent=score;
  const li=getLvIdx(score),cur=LEVELS[li],nxt=LEVELS[li+1];
  let pct=100;
  if(nxt)pct=Math.min(100,((score-cur.score)/(nxt.score-cur.score))*100);
  document.getElementById('lpf').style.width=pct+'%';
}
function updateHUD(){
  document.getElementById('hv-best').textContent=Math.max(score,hi);
  document.getElementById('hv-coin').textContent=coins;
  document.getElementById('hv-lvl').textContent=lvIdx+1;
}

// ── DIE ───────────────────────────────────────────────────────────
function die(){
  if(!bird.alive)return;
  bird.alive=false;state='dead';
  cancelAnimationFrame(RAF);RAF=null;
  hap.die();
  document.getElementById('toast').classList.remove('show');
  if(toastT){clearTimeout(toastT);toastT=null}
  document.getElementById('ctrl').classList.remove('on');
  document.getElementById('sp').classList.remove('on');
  const isNew=score>hi;
  if(isNew)hi=score;
  totalCoins+=coins;
  setTimeout(()=>{
    document.getElementById('go-score').textContent=score;
    document.getElementById('go-best').textContent=hi;
    document.getElementById('go-coins').textContent=coins;
    document.getElementById('go-time').textContent=elapsed+'s';
    document.getElementById('go-lv').textContent='LV '+(lvIdx+1)+' · '+LEVELS[lvIdx].label;
    if(isNew)document.getElementById('bb').classList.add('on');
    else document.getElementById('bb').classList.remove('on');
    document.getElementById('go').classList.add('on');
    document.getElementById('sd').textContent='';
    document.getElementById('lpf').style.width='0%';
    document.getElementById('hv-best').textContent=hi;
    document.getElementById('ss-best').textContent=hi;
    document.getElementById('ss-coins').textContent=totalCoins;
  },500);
}

// ── COIN BURST ────────────────────────────────────────────────────
function spawnCoinBurst(cx,cy){
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    const el=document.createElement('div');el.className='pt';
    el.style.cssText=`width:6px;height:6px;background:#f5a820;`
      +`left:${cx}px;top:${cy}px;`
      +`--dx:${Math.cos(a)*28}px;--dy:${Math.sin(a)*18}px;`
      +`--dur:0.45s;box-shadow:0 0 5px rgba(245,168,32,.65)`;
    wrap.appendChild(el);setTimeout(()=>el.remove(),600);
  }
}

// ── DRAW ──────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  // sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0d0d2b');sky.addColorStop(.5,'#1a1a3e');sky.addColorStop(1,'#2a1a4a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  if(skyFlash>0){ctx.save();ctx.globalAlpha=skyFlash*.2;ctx.fillStyle='rgba(245,200,66,1)';ctx.fillRect(0,0,W,H);ctx.restore()}
  // clouds
  for(const cl of clouds){
    ctx.save();ctx.globalAlpha=cl.a;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(cl.x,cl.y,cl.w/2,cl.h/2,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  // ground scroll stripe
  ctx.save();ctx.fillStyle='rgba(255,255,255,0.05)';
  for(let x=-gndOff%36;x<W;x+=36)ctx.fillRect(x,GND+3,18,5);
  ctx.restore();
  // pipes
  for(const p of pipes)drawPipe(p);
  // coins
  for(const c of coinObjs)if(!c.col)drawCoin(c);
  // trail
  for(let i=0;i<bird.trail.length;i++){
    const t=bird.trail[i],a=(i/bird.trail.length)*.18;
    ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#f5c842';
    ctx.beginPath();ctx.arc(t.x,t.y,bird.r*.5*(i/bird.trail.length),0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  drawBird();
}

function drawPipe(p){
  const x=p.x,gap=CUR.gap;
  const mkG=()=>{const g=ctx.createLinearGradient(x,0,x+PIPE_W,0);
    g.addColorStop(0,'#1e4a28');g.addColorStop(.3,'#2d6e3a');g.addColorStop(.7,'#275e32');g.addColorStop(1,'#162a1c');return g};
  ctx.fillStyle=mkG();
  ctx.beginPath();ctx.roundRect(x,0,PIPE_W,p.topH-16,[0,0,4,4]);ctx.fill();
  ctx.fillStyle='#3d7a4a';
  ctx.beginPath();ctx.roundRect(x-6,p.topH-28,PIPE_W+12,28,[4,4,6,6]);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(x-4,p.topH-26,11,22);
  const bY=p.topH+gap;
  ctx.fillStyle=mkG();
  ctx.beginPath();ctx.roundRect(x,bY+16,PIPE_W,GND-bY-16,[4,4,0,0]);ctx.fill();
  ctx.fillStyle='#3d7a4a';
  ctx.beginPath();ctx.roundRect(x-6,bY,PIPE_W+12,28,[6,6,4,4]);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(x-4,bY+4,11,20);
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.fillRect(x+8,0,9,p.topH-16);ctx.fillRect(x+8,bY+16,9,GND-bY-16);
}

function drawCoin(c){
  const pulse=Math.sin(c.pulse),r=c.r*(0.94+pulse*.08);
  ctx.save();ctx.shadowBlur=10*(0.7+pulse*.3);ctx.shadowColor='rgba(245,200,66,0.55)';
  const cg=ctx.createRadialGradient(c.x-r*.3,c.y-r*.3,1,c.x,c.y,r);
  cg.addColorStop(0,'#f5d860');cg.addColorStop(.6,'#e8a020');cg.addColorStop(1,'#7a5010');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(c.x,c.y,r*.62,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(100,55,0,0.7)';
  ctx.font=`bold ${r*1.1}px Orbitron,monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('$',c.x,c.y+1);ctx.restore();
}

function drawBird(){
  ctx.save();
  ctx.translate(bird.x,bird.y);
  ctx.rotate(bird.ang);
  if(faceImg.complete&&faceImg.naturalWidth>0){
    // Circular clipped face
    const sz=bird.r*2.4;
    ctx.save();
    // golden ring glow
    ctx.shadowBlur=18;ctx.shadowColor='rgba(245,200,66,0.6)';
    // ring
    ctx.beginPath();ctx.arc(0,0,bird.r*1.22,0,Math.PI*2);
    ctx.strokeStyle='rgba(245,200,66,0.9)';ctx.lineWidth=3;ctx.stroke();
    ctx.shadowBlur=0;
    // clip circle
    ctx.beginPath();ctx.arc(0,0,bird.r*1.18,0,Math.PI*2);ctx.clip();
    ctx.drawImage(faceImg,-sz/2,-sz/2,sz,sz);
    ctx.restore();
  } else {
    // fallback smiley
    ctx.shadowBlur=16;ctx.shadowColor='rgba(245,200,66,0.3)';
    const bg=ctx.createRadialGradient(-3,-4,2,0,0,bird.r);
    bg.addColorStop(0,'#f5d860');bg.addColorStop(.6,'#e8a020');bg.addColorStop(1,'#a87010');
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,0,bird.r,bird.r*.84,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bird.r*.38,-bird.r*.22,5.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(bird.r*.46,-bird.r*.18,2.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c47a35';
    ctx.beginPath();ctx.moveTo(bird.r*.7,-2);ctx.lineTo(bird.r*1.14,1);ctx.lineTo(bird.r*.7,4);ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

// ── GAME LOOP ─────────────────────────────────────────────────────
function loop(){update();draw();if(state==='playing')RAF=requestAnimationFrame(loop)}

// ── COUNTDOWN ────────────────────────────────────────────────────
let cdActive=false;
function startCD(){
  if(cdActive)return;cdActive=true;
  cancelAnimationFrame(RAF);RAF=null;
  document.getElementById('ss').style.display='none';
  document.getElementById('go').classList.remove('on');
  document.getElementById('pov').classList.remove('on');
  document.getElementById('pb').textContent='⏸';
  state='countdown';
  score=0;coins=0;elapsed=0;lvIdx=0;CUR={...LEVELS[0]};
  document.getElementById('sd').textContent='0';
  document.getElementById('lpf').style.width='0%';
  updateHUD();initBird();initPipes();tryFS();draw();
  const cdEl=document.getElementById('cd'),num=document.getElementById('cdn');
  cdEl.classList.add('on');let n=3;num.textContent=n;
  const iv=setInterval(()=>{
    n--;
    if(n<=0){
      clearInterval(iv);num.textContent='GO!';
      num.style.animation='none';void num.offsetWidth;num.style.animation='cpop .8s ease-out';
      setTimeout(()=>{
        cdEl.classList.remove('on');
        state='playing';t0=Date.now();cdActive=false;
        document.getElementById('ctrl').classList.add('on');
        document.getElementById('sp').classList.add('on');
        RAF=requestAnimationFrame(loop);
      },700);
    } else {
      num.textContent=n;
      num.style.animation='none';void num.offsetWidth;num.style.animation='cpop .8s ease-out';
    }
  },900);
}

// ── INPUT ────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){
    e.preventDefault();
    if(state==='paused')resumeGame();else flap();
  }
  if(e.code==='KeyP'||e.code==='Escape'){
    e.preventDefault();
    if(state==='playing'||state==='paused')togglePause();
  }
});
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state==='paused')resumeGame();else flap()},{passive:false});
canvas.addEventListener('mousedown',e=>{e.preventDefault();if(state==='paused')resumeGame();else flap()});

// ── IDLE ANIMATION ────────────────────────────────────────────────
initBird();state='idle';
(function idleLp(){
  if(state!=='idle')return;
  bird.y=H*.42+Math.sin(Date.now()*.002)*14;
  bird.ang=Math.sin(Date.now()*.002)*.14;
  bird.wAng+=0.08;bird.trail=[];
  draw();requestAnimationFrame(idleLp);
})();
</script>
