<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✈️ Aviator Fun</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f1923;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #1a2634;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #ff4757;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 1.3rem; font-weight: 900; color: #ff4757; letter-spacing: 2px; }
    .logo span { color: #fff; }
    .balance-box {
      background: #0f1923;
      border: 1px solid #ff4757;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.85rem;
    }
    .balance-box .amt { color: #ff4757; font-weight: 700; }

    /* ── Game area ── */
    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Canvas ── */
    .canvas-wrap {
      position: relative;
      background: #141d27;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #1e2d3d;
    }
    #gameCanvas { display: block; width: 100%; height: auto; }

    .mult-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }
    .mult-num {
      font-size: clamp(2.4rem, 9vw, 5rem);
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(255,71,87,.7);
      transition: color .25s;
    }
    .mult-num.flying  { color: #fff; }
    .mult-num.crashed { color: #ff4757; }
    .mult-num.waiting { color: #667; }
    .mult-sub { font-size: .8rem; color: #aaa; margin-top: 4px; letter-spacing: 1px; }

    .cd-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
    }
    .cd-num   { font-size: clamp(3rem, 12vw, 6.5rem); font-weight: 900; color: #ff4757; line-height: 1; }
    .cd-label { font-size: .8rem; color: #aaa; margin-top: 6px; letter-spacing: 1px; }

    /* ── History ── */
    .history {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 10px;
      background: #141d27;
      border-radius: 10px;
      border: 1px solid #1e2d3d;
      min-height: 44px;
      align-items: center;
    }
    .hist-empty { color: #445; font-size: .8rem; }
    .hbubble {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 700;
    }
    .hbubble.c1 { background:#3a1a1a; color:#ff4757; border:1px solid #ff4757; }
    .hbubble.c2 { background:#1a3a2a; color:#2ecc71; border:1px solid #2ecc71; }
    .hbubble.c3 { background:#1a2a3a; color:#3498db; border:1px solid #3498db; }
    .hbubble.c4 { background:#3a1a3a; color:#e056fd; border:1px solid #e056fd; }

    /* ── Controls ── */
    .controls {
      background: #141d27;
      border-radius: 14px;
      padding: 16px;
      border: 1px solid #1e2d3d;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .row { display: flex; gap: 10px; }
    .field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: .7rem; color: #aaa; letter-spacing: .5px; text-transform: uppercase; }
    .inp {
      background: #0f1923;
      border: 1px solid #1e2d3d;
      color: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .95rem;
      outline: none;
      width: 100%;
      transition: border-color .2s;
    }
    .inp:focus { border-color: #ff4757; }

    .quick-row { display: flex; gap: 6px; }
    .qbtn {
      flex: 1;
      background: #1a2634;
      border: 1px solid #1e2d3d;
      color: #aaa;
      border-radius: 6px;
      padding: 7px 4px;
      font-size: .72rem;
      cursor: pointer;
      transition: all .2s;
    }
    .qbtn:hover { background: #ff4757; color: #fff; border-color: #ff4757; }

    .auto-row { display: flex; align-items: center; gap: 10px; }
    .auto-row label { font-size: .75rem; color: #aaa; cursor: pointer; }
    .toggle { position: relative; width: 38px; height: 21px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .tslider {
      position: absolute; inset: 0;
      background: #1e2d3d; border-radius: 21px; cursor: pointer; transition: .3s;
    }
    .tslider::before {
      content: ""; position: absolute;
      height: 15px; width: 15px; left: 3px; bottom: 3px;
      background: #667; border-radius: 50%; transition: .3s;
    }
    .toggle input:checked + .tslider { background: #ff4757; }
    .toggle input:checked + .tslider::before { transform: translateX(17px); background: #fff; }

    /* Main buttons */
    .main-btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-size: 1.05rem; font-weight: 700; cursor: pointer;
      transition: all .2s; letter-spacing: 1px;
    }
    .bet-btn  { background: linear-gradient(135deg,#ff4757,#c0392b); color: #fff; }
    .cash-btn { background: linear-gradient(135deg,#2ecc71,#27ae60); color: #fff; display: none; }
    .main-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
    .main-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; filter: none; }

    /* Status */
    .status { text-align: center; font-size: .78rem; color: #667; padding: 4px 0 2px; }

    /* Toast */
    .toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #1a2634; border-radius: 10px;
      padding: 12px 24px; font-weight: 700; font-size: .95rem;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 999; border: 2px solid #ff4757; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.win  { border-color: #2ecc71; color: #2ecc71; }
    .toast.lose { border-color: #ff4757; color: #ff4757; }
    .toast.info { border-color: #3498db; color: #3498db; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">✈️ AVIA<span>TOR</span></div>
  <div class="balance-box">Balance: <span class="amt" id="balDisp">1,000</span> 🪙</div>
</div>

<div class="game-area">

  <!-- Canvas -->
  <div class="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
    <div class="mult-overlay">
      <div class="mult-num waiting" id="multNum">1.00x</div>
      <div class="mult-sub" id="multSub">WAITING...</div>
    </div>
    <div class="cd-overlay" id="cdBox">
      <div class="cd-num" id="cdNum">4</div>
      <div class="cd-label">NEXT ROUND IN</div>
    </div>
  </div>

  <!-- History -->
  <div class="history" id="histBox">
    <span class="hist-empty">Round history will appear here…</span>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="row">
      <div class="field">
        <label>Bet Amount 🪙</label>
        <input class="inp" type="number" id="betInp" value="50" min="1">
      </div>
      <div class="field">
        <label>Auto Cash-Out At</label>
        <input class="inp" type="number" id="autoVal" value="2.00" step="0.1" min="1.01">
      </div>
    </div>

    <div class="auto-row">
      <label class="toggle">
        <input type="checkbox" id="autoChk">
        <span class="tslider"></span>
      </label>
      <label for="autoChk">Enable Auto Cash-Out</label>
    </div>

    <div class="quick-row">
      <button class="qbtn" onclick="qBet(10)">10</button>
      <button class="qbtn" onclick="qBet(25)">25</button>
      <button class="qbtn" onclick="qBet(50)">50</button>
      <button class="qbtn" onclick="qBet(100)">100</button>
      <button class="qbtn" onclick="qBet(200)">200</button>
      <button class="qbtn" onclick="qHalf()">½</button>
      <button class="qbtn" onclick="qDouble()">2×</button>
    </div>

    <button class="main-btn bet-btn"  id="betBtn"  onclick="placeBet()">PLACE BET</button>
    <button class="main-btn cash-btn" id="cashBtn" onclick="cashOut()">CASH OUT — 1.00x</button>
  </div>

  <div class="status" id="statusBar">Place your bet before the plane takes off!</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const CANVAS_W   = 600;
const CANVAS_H   = 280;
const GROW_RATE  = 0.055;   // multiplier = e^(GROW_RATE * t)
const CD_SECS    = 4;       // countdown before round

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let balance      = 1000;
let betAmt       = 0;
let hasBet       = false;
let cashedOut    = false;
let gameState    = 'waiting'; // waiting | flying | crashed
let multiplier   = 1.00;
let crashAt      = 2.00;
let startTime    = null;
let raf          = null;
let cdInterval   = null;
let cdVal        = CD_SECS;
let history      = [];
let pts          = [];       // curve points

// ═══════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = CANVAS_W;
canvas.height = CANVAS_H;

function syncSize() {
  const w = canvas.parentElement.clientWidth;
  canvas.style.height = (CANVAS_H * (w / CANVAS_W)) + 'px';
}
window.addEventListener('resize', () => { syncSize(); draw(); });
syncSize();

// ═══════════════════════════════════════════
//  CRASH POINT GENERATOR
// ═══════════════════════════════════════════
function genCrash() {
  const r = Math.random();
  if (r < 0.03) return 1.00;                          // 3% instant crash
  if (r < 0.10) return +(1 + Math.random() * 0.45).toFixed(2); // low crash
  return +Math.max(1.01, 0.99 / (1 - Math.random() * 0.96)).toFixed(2);
}

// ═══════════════════════════════════════════
//  CURVE MATH
// ═══════════════════════════════════════════
function tToPoint(t) {
  const maxT = Math.log(120) / GROW_RATE;
  const xNorm = Math.min(t / maxT, 1);
  const x = xNorm * (CANVAS_W - 40) + 30;
  const m = Math.exp(GROW_RATE * t);
  const yNorm = Math.min((m - 1) / 60, 1);
  const y = CANVAS_H - 28 - yNorm * (CANVAS_H - 60);
  return { x, y };
}

// ═══════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  grad.addColorStop(0, '#0c1520');
  grad.addColorStop(1, '#141d27');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  for (let i = 0; i < 50; i++) {
    const sx = (i * 139.7) % CANVAS_W;
    const sy = (i * 97.3)  % CANVAS_H;
    ctx.beginPath();
    ctx.arc(sx, sy, i % 4 === 0 ? 1.2 : .5, 0, Math.PI*2);
    ctx.fill();
  }

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,.035)';
  ctx.lineWidth = 1;
  for (let x = 0; x < CANVAS_W; x += 55) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,CANVAS_H); ctx.stroke(); }
  for (let y = 0; y < CANVAS_H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CANVAS_W,y); ctx.stroke(); }

  // Axes
  ctx.strokeStyle = 'rgba(255,255,255,.12)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(28,8); ctx.lineTo(28,CANVAS_H-22); ctx.lineTo(CANVAS_W-8,CANVAS_H-22); ctx.stroke();
}

function drawCurve() {
  if (pts.length < 2) return;
  const crashed = gameState === 'crashed';
  const lineColor = crashed ? '#ff4757' : '#ff6b7a';

  // Fill
  const fg = ctx.createLinearGradient(0,0,0,CANVAS_H);
  fg.addColorStop(0, crashed ? 'rgba(255,71,87,.28)' : 'rgba(255,71,87,.22)');
  fg.addColorStop(1, 'rgba(255,71,87,.02)');

  ctx.beginPath();
  ctx.moveTo(pts[0].x, CANVAS_H-22);
  ctx.lineTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  const last = pts[pts.length-1];
  ctx.lineTo(last.x, CANVAS_H-22);
  ctx.closePath();
  ctx.fillStyle = fg;
  ctx.fill();

  // Line + glow
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.shadowColor = '#ff4757';
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawPlane(x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor = '#ff4757';
  ctx.shadowBlur = 22;

  // Trail
  const trail = ctx.createLinearGradient(-60,0,-10,0);
  trail.addColorStop(0,'rgba(255,107,122,0)');
  trail.addColorStop(1,'rgba(255,107,122,.55)');
  ctx.fillStyle = trail;
  ctx.beginPath(); ctx.ellipse(-35, 2, 28, 5, 0, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = '#f0f0f0'; ctx.strokeStyle = '#ff4757'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(0,0,17,6,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Nose
  ctx.fillStyle = '#ff4757';
  ctx.beginPath(); ctx.moveTo(17,0); ctx.lineTo(28,0); ctx.lineTo(19,-4); ctx.closePath(); ctx.fill();

  // Wing
  ctx.fillStyle = '#ddd';
  ctx.beginPath(); ctx.moveTo(2,0); ctx.lineTo(-7,-16); ctx.lineTo(-14,-15); ctx.lineTo(-11,0); ctx.closePath(); ctx.fill(); ctx.stroke();

  // Tail
  ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(-19,-9); ctx.lineTo(-23,-9); ctx.lineTo(-16,0); ctx.closePath(); ctx.fill(); ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBoom(x, y) {
  ctx.save(); ctx.translate(x, y);
  const colors = ['#ff4757','#ffa502','#ff6348','#eccc68'];
  for (let i = 0; i < 10; i++) {
    const a = (i/10)*Math.PI*2;
    ctx.beginPath(); ctx.arc(Math.cos(a)*22, Math.sin(a)*22, 5, 0, Math.PI*2);
    ctx.fillStyle = colors[i%4]; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2);
  ctx.fillStyle = 'rgba(255,71,87,.85)'; ctx.fill();
  ctx.restore();
}

function draw() {
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  drawBg();
  drawCurve();
  if (pts.length > 0) {
    const last = pts[pts.length-1];
    if (gameState === 'flying')  drawPlane(last.x, last.y);
    if (gameState === 'crashed') drawBoom(last.x, last.y);
  }
}

// ═══════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════
function startCountdown() {
  gameState = 'waiting';
  pts = [];
  multiplier = 1.00;
  crashAt = genCrash();
  hasBet = false;
  cashedOut = false;
  cdVal = CD_SECS;

  el('betBtn').disabled  = false;
  el('betBtn').textContent = 'PLACE BET';
  el('betBtn').style.display  = 'block';
  el('cashBtn').style.display = 'none';
  el('multNum').className = 'mult-num waiting';
  el('multNum').textContent = '1.00x';
  el('multSub').textContent = 'WAITING...';

  el('cdBox').style.display = 'block';
  el('cdNum').textContent = cdVal;
  setStatus('Place your bet! Round starting in ' + cdVal + 's…');
  draw();

  cdInterval = setInterval(() => {
    cdVal--;
    el('cdNum').textContent = cdVal;
    setStatus('Place your bet! Round starting in ' + cdVal + 's…');
    if (cdVal <= 0) {
      clearInterval(cdInterval);
      el('cdBox').style.display = 'none';
      beginFlight();
    }
  }, 1000);
}

function beginFlight() {
  gameState = 'flying';
  startTime = performance.now();
  pts = [];
  el('multNum').className = 'mult-num flying';
  el('multSub').textContent = 'FLYING ✈️';
  el('betBtn').disabled = true;

  if (hasBet && !cashedOut) {
    el('cashBtn').style.display = 'block';
    el('betBtn').style.display  = 'none';
  }
  setStatus('Plane is flying! Cash out before it crashes!');
  loop();
}

function loop() {
  const t = (performance.now() - startTime) / 1000;
  multiplier = +Math.exp(GROW_RATE * t).toFixed(2);

  pts.push(tToPoint(t));
  el('multNum').textContent = multiplier.toFixed(2) + 'x';

  if (hasBet && !cashedOut) {
    el('cashBtn').textContent = 'CASH OUT — ' + multiplier.toFixed(2) + 'x';
  }

  // Auto cash-out
  if (el('autoChk').checked && hasBet && !cashedOut) {
    const aVal = parseFloat(el('autoVal').value) || 2.0;
    if (multiplier >= aVal) { cashOut(); }
  }

  draw();

  if (multiplier >= crashAt) { doCrash(t); return; }
  raf = requestAnimationFrame(loop);
}

function doCrash(t) {
  gameState = 'crashed';
  cancelAnimationFrame(raf);
  pts.push(tToPoint(t));

  el('multNum').className = 'mult-num crashed';
  el('multNum').textContent = crashAt.toFixed(2) + 'x';
  el('multSub').textContent = '💥 FLEW AWAY!';
  el('cashBtn').style.display = 'none';
  el('betBtn').style.display  = 'block';
  el('betBtn').disabled = true;

  draw();
  pushHistory(crashAt);

  if (hasBet && !cashedOut) {
    toast('💸 Flew away at ' + crashAt.toFixed(2) + 'x! Lost ' + betAmt + ' 🪙', 'lose');
    setStatus('You lost ' + betAmt + ' 🪙! Better luck next round.');
  } else {
    setStatus('Crashed at ' + crashAt.toFixed(2) + 'x — place a bet next round!');
  }

  updBal();
  if (balance <= 0) { balance = 500; toast('🎁 Refilled with 500 free coins!', 'info'); updBal(); }

  setTimeout(startCountdown, 3200);
}

// ═══════════════════════════════════════════
//  BET / CASH OUT
// ═══════════════════════════════════════════
function placeBet() {
  if (gameState === 'flying') return;
  const amt = parseInt(el('betInp').value);
  if (!amt || amt < 1) { toast('Enter a valid amount!','lose'); return; }
  if (amt > balance)   { toast('Not enough coins! 💸','lose'); return; }

  betAmt = amt;
  balance -= betAmt;
  hasBet = true;
  cashedOut = false;
  updBal();

  el('betBtn').textContent = '✅ BET: ' + betAmt + ' 🪙';
  el('betBtn').disabled = true;
  setStatus('Bet placed! Waiting for round to start…');
  toast('Bet of ' + betAmt + ' 🪙 placed!', 'info');
}

function cashOut() {
  if (!hasBet || cashedOut || gameState !== 'flying') return;
  cashedOut = true;
  const won = Math.floor(betAmt * multiplier);
  balance += won;
  updBal();

  el('cashBtn').style.display = 'none';
  el('betBtn').style.display  = 'block';
  el('betBtn').disabled = true;

  toast('🎉 Cashed out at ' + multiplier.toFixed(2) + 'x! Won ' + won + ' 🪙', 'win');
  setStatus('Cashed out at ' + multiplier.toFixed(2) + 'x! Profit: +' + (won - betAmt) + ' 🪙');
}

// ═══════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════
function pushHistory(c) {
  history.unshift(c);
  if (history.length > 14) history.pop();
  const box = el('histBox');
  box.innerHTML = history.map(v => {
    let cls = 'c1';
    if (v >= 10)  cls = 'c4';
    else if (v >= 3) cls = 'c3';
    else if (v >= 1.5) cls = 'c2';
    return `<span class="hbubble ${cls}">${v.toFixed(2)}x</span>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  QUICK BET HELPERS
// ═══════════════════════════════════════════
function qBet(n)  { el('betInp').value = Math.min(n, balance); }
function qHalf()  { el('betInp').value = Math.max(1, Math.floor((+el('betInp').value||50)/2)); }
function qDouble(){ el('betInp').value = Math.min((+el('betInp').value||50)*2, balance); }

// ═══════════════════════════════════════════
//  UI UTILITIES
// ═══════════════════════════════════════════
function el(id) { return document.getElementById(id); }
function updBal() { el('balDisp').textContent = balance.toLocaleString(); }
function setStatus(msg) { el('statusBar').textContent = msg; }

let tTimer;
function toast(msg, type) {
  const t = el('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(tTimer);
  tTimer = setTimeout(() => { t.className = 'toast ' + type; }, 2800);
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
draw();
startCountdown();
</script>
</body>
</html>
